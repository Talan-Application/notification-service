services:
    postgres:
        image: postgres:18.1-bookworm
        environment:
            POSTGRES_USER: ${DATABASE_USER:-postgres}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
            POSTGRES_DB: ${DATABASE_DBNAME:-notification_db}
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
            - "${DATABASE_PORT:-5433}:5432"
        networks:
            - notification-network

    notification-migration:
        image: migrate/migrate:v4.19.1
        volumes:
            - ${PROJECT_ROOT:-./}/migrations:/migrations
        networks:
            - notification-network

    notification-service:
        build: .
        environment:
            APP_ENV: ${APP_ENV:-production}
            APP_SENDERTYPE: ${APP_SENDERTYPE:-smtp}
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
            DATABASE_USER: ${DATABASE_USER:-postgres}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
            DATABASE_DBNAME: ${DATABASE_DBNAME:-notification_db}
            DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
            RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
            SMTP_HOST: ${SMTP_HOST:-localhost}
            SMTP_PORT: ${SMTP_PORT:-1025}
            SMTP_USERNAME: ${SMTP_USERNAME:-}
            SMTP_PASSWORD: ${SMTP_PASSWORD:-}
            SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
            SMTP_TLS: ${SMTP_TLS:-false}
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - notification-network

networks:
    notification-network:
        driver: bridge

volumes:
    postgres_data:
