app:
  name: notification-service
  env: development
  senderType: console   # "console" (logs only) or "smtp"

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: notification_db
  sslmode: disable

rabbitmq:
  url: amqp://guest:guest@localhost:5672/

smtp:
  host: smtp.example.com
  port: 587
  username: user@example.com
  password: secret
  from: noreply@talan.app
  tls: true
